{{- /*
PrometheusRule — bitnami postgresql-ha chart parity + controller-runtime
operator health alerts (8 alerts). Chart 사용자가 monitoring 활성 시 자동 렌더.

*prometheus-operator CRD 미설치* 환경에서는 helm install 시 거절 —
opt-out: monitoring.prometheusRule.enabled=false.
*/}}
{{- if and .Values.metrics.enabled .Values.metrics.prometheusRule.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "postgres-operator.fullname" . }}-alerts
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgres-operator.labels" . | nindent 4 }}
spec:
  groups:
    - name: postgres-operator.rules
      interval: 30s
      rules:
        - alert: PostgresOperatorReconcileFailureRate
          expr: rate(controller_runtime_reconcile_errors_total{controller=~"postgrescluster|backupjob"}[5m]) > 0.1
          for: 10m
          labels:
            severity: warning
            component: postgres-operator
          annotations:
            summary: "Postgres Operator reconcile failure rate elevated"
            description: "controller-runtime reconcile errors > 0.1/s 지속."
            runbook_url: https://github.com/keiailab/postgres-operator/blob/main/docs/operations/runbook.md
        - alert: PostgresOperatorLeaderElectionLost
          expr: leader_election_master_status{name="postgres-operator-controller-manager"} == 0
          for: 5m
          labels:
            severity: critical
            component: postgres-operator
          annotations:
            summary: "Postgres Operator leader election lost"
        - alert: PostgresClusterReplicationLagHigh
          expr: pg_replication_lag_seconds > 60
          for: 10m
          labels:
            severity: warning
            component: postgres
          annotations:
            summary: "PostgresCluster {{`{{ $labels.cluster }}`}} replication lag > 60s"
            description: "Streaming replication lag 초과 — replica 가 primary 따라가지 못하는 상태."
        - alert: PostgresClusterConnectionsHigh
          expr: pg_stat_activity_count / pg_settings_max_connections > 0.8
          for: 5m
          labels:
            severity: warning
            component: postgres
          annotations:
            summary: "PostgresCluster {{`{{ $labels.cluster }}`}} connections > 80% of max_connections"
            description: "Connection pool 의 80% 초과 — connection leak 또는 PgBouncer 도입 검토."
        - alert: PostgresClusterPrimaryDown
          expr: pg_up{role="primary"} == 0
          for: 2m
          labels:
            severity: critical
            component: postgres
          annotations:
            summary: "PostgresCluster {{`{{ $labels.cluster }}`}} primary down"
            description: "Primary Pod liveness 실패. failover 필요 (Repmgr / pg_auto_failover)."
        - alert: PostgresClusterBackupFailed
          expr: kube_job_status_failed{job_name=~"postgres-backup-.*"} > 0
          for: 5m
          labels:
            severity: warning
            component: postgres-operator
          annotations:
            summary: "Postgres Backup Job {{`{{ $labels.job_name }}`}} failed"
        - alert: PostgresClusterLocksHigh
          expr: pg_locks_count > 1000
          for: 10m
          labels:
            severity: warning
            component: postgres
          annotations:
            summary: "PostgresCluster {{`{{ $labels.cluster }}`}} lock count > 1000"
            description: "Lock contention 또는 deadlock 가능성 — pg_stat_activity 확인."
        - alert: PostgresOperatorWorkqueueDepthHigh
          expr: workqueue_depth{name=~"postgrescluster.*"} > 50
          for: 10m
          labels:
            severity: warning
            component: postgres-operator
          annotations:
            summary: "Postgres Operator workqueue depth > 50"
{{- end -}}
