{{- if .Values.networkPolicies.enabled -}}
# P0-3 (ADR 0006 §NetworkPolicy) 데이터플레인 NetworkPolicy를 chart에 통합.
# config/network-policy/dataplane-*.yaml의 결과를 *helm 변수화*하여 통합.
#
# 주의: Service Selector 라벨은 internal/controller/names.go의 SelectorLabels
# 패턴(`app.kubernetes.io/managed-by: keiailab-postgres-operator`)에 의존하므로
# operator 코드 변경 시 본 파일도 동기화 필요.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "postgres-operator.fullname" . }}-dataplane-default-deny
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgres-operator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/managed-by: keiailab-postgres-operator
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "postgres-operator.fullname" . }}-dataplane-allow-internal
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgres-operator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/managed-by: keiailab-postgres-operator
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/managed-by: keiailab-postgres-operator
      ports:
        - port: 5432
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/managed-by: keiailab-postgres-operator
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "postgres-operator.fullname" . }}-dataplane-allow-router-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgres-operator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/managed-by: keiailab-postgres-operator
      app.kubernetes.io/component: router
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - port: 5432
          protocol: TCP
{{- end }}
