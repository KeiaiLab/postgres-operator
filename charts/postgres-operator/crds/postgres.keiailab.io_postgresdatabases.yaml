---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: postgresdatabases.postgres.keiailab.io
spec:
  group: postgres.keiailab.io
  names:
    categories:
    - postgres
    - database
    - all
    kind: PostgresDatabase
    listKind: PostgresDatabaseList
    plural: postgresdatabases
    shortNames:
    - pgdb
    singular: postgresdatabase
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.cluster.name
      name: Cluster
      type: string
    - jsonPath: .spec.name
      name: Database
      type: string
    - jsonPath: .spec.owner
      name: Owner
      type: string
    - jsonPath: .status.applied
      name: Applied
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PostgresDatabaseSpec ports the core operational surface of
              the CNPG Database CRD to this operator's model.
            properties:
              cluster:
                description: Cluster is the PostgresCluster in which the database
                  is created.
                properties:
                  name:
                    description: Name is the PostgresCluster.metadata.name.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              databaseReclaimPolicy:
                default: retain
                description: DatabaseReclaimPolicy controls how the database is handled
                  when the CR is deleted. Empty defaults to retain.
                enum:
                - retain
                - delete
                type: string
              ensure:
                default: present
                description: Ensure is the desired database existence state. Empty
                  defaults to present.
                enum:
                - present
                - absent
                type: string
              extensions:
                description: Extensions is the list of extensions declaratively managed
                  inside the target database.
                items:
                  description: DatabaseExtensionSpec is an extension managed inside
                    the target database.
                  properties:
                    ensure:
                      default: present
                      description: Ensure is the desired extension existence state.
                        Empty defaults to present.
                      enum:
                      - present
                      - absent
                      type: string
                    name:
                      description: Name is the PostgreSQL extension name.
                      minLength: 1
                      type: string
                    schema:
                      description: Schema is the schema in which the extension is
                        placed.
                      type: string
                    version:
                      description: Version is the extension version to install or
                        upgrade to.
                      type: string
                  required:
                  - name
                  type: object
                type: array
              fdws:
                description: FDWs is the list of foreign data wrappers declaratively
                  managed inside the target database.
                items:
                  description: DatabaseFDWSpec is a foreign data wrapper managed inside
                    the target database.
                  properties:
                    ensure:
                      default: present
                      description: Ensure is the desired FDW existence state. Empty
                        defaults to present.
                      enum:
                      - present
                      - absent
                      type: string
                    handler:
                      description: Handler is the FDW handler function name. "-" means
                        NO HANDLER.
                      type: string
                    name:
                      description: Name is the foreign data wrapper name.
                      minLength: 1
                      type: string
                    options:
                      description: Options is the list of FDW options.
                      items:
                        description: DatabaseOptionSpec is the declared state of a
                          single FDW/server option.
                        properties:
                          ensure:
                            default: present
                            description: Ensure is the desired option existence state.
                              Empty defaults to present.
                            enum:
                            - present
                            - absent
                            type: string
                          name:
                            description: Name is the option name.
                            minLength: 1
                            type: string
                          value:
                            description: Value is the option value. May be omitted
                              when ensure=absent.
                            type: string
                        required:
                        - name
                        type: object
                      type: array
                    owner:
                      description: Owner is the FDW owner role.
                      type: string
                    usage:
                      description: Usage is the list of FDW USAGE privilege entries.
                      items:
                        description: DatabaseUsageSpec is a reconcile entry for granting
                          or revoking role USAGE on an FDW/server.
                        properties:
                          name:
                            description: Name is the PostgreSQL role to grant or revoke
                              privileges from.
                            minLength: 1
                            type: string
                          type:
                            default: grant
                            description: Type is grant or revoke. Empty defaults to
                              grant.
                            enum:
                            - grant
                            - revoke
                            type: string
                        required:
                        - name
                        type: object
                      type: array
                    validator:
                      description: Validator is the FDW validator function name. "-"
                        means NO VALIDATOR.
                      type: string
                  required:
                  - name
                  type: object
                type: array
              name:
                description: Name is the PostgreSQL database name.
                minLength: 1
                type: string
              owner:
                description: Owner is the database owner role.
                minLength: 1
                type: string
              privileges:
                description: Privileges is the list of role privilege grants/revokes
                  on the database object itself.
                items:
                  description: DatabaseGrantSpec is a database- or schema-level privilege
                    grant/revoke entry.
                  properties:
                    privileges:
                      description: |-
                        Privileges is the list of PostgreSQL privileges to apply to the target object.
                        For databases: CONNECT, CREATE, TEMPORARY, TEMP, ALL PRIVILEGES.
                        For schemas: USAGE, CREATE, ALL PRIVILEGES.
                      items:
                        type: string
                      minItems: 1
                      type: array
                    role:
                      description: Role is the PostgreSQL role to grant or revoke
                        privileges from.
                      minLength: 1
                      type: string
                    type:
                      default: grant
                      description: Type is grant or revoke. Empty defaults to grant.
                      enum:
                      - grant
                      - revoke
                      type: string
                  required:
                  - privileges
                  - role
                  type: object
                type: array
              schemas:
                description: Schemas is the list of schemas declaratively managed
                  inside the target database.
                items:
                  description: DatabaseSchemaSpec is a schema managed inside the target
                    database.
                  properties:
                    ensure:
                      default: present
                      description: Ensure is the desired schema existence state. Empty
                        defaults to present.
                      enum:
                      - present
                      - absent
                      type: string
                    name:
                      description: Name is the PostgreSQL schema name.
                      minLength: 1
                      type: string
                    owner:
                      description: Owner is the schema owner role.
                      type: string
                    privileges:
                      description: Privileges is the list of role privilege grants/revokes
                        on this schema.
                      items:
                        description: DatabaseGrantSpec is a database- or schema-level
                          privilege grant/revoke entry.
                        properties:
                          privileges:
                            description: |-
                              Privileges is the list of PostgreSQL privileges to apply to the target object.
                              For databases: CONNECT, CREATE, TEMPORARY, TEMP, ALL PRIVILEGES.
                              For schemas: USAGE, CREATE, ALL PRIVILEGES.
                            items:
                              type: string
                            minItems: 1
                            type: array
                          role:
                            description: Role is the PostgreSQL role to grant or revoke
                              privileges from.
                            minLength: 1
                            type: string
                          type:
                            default: grant
                            description: Type is grant or revoke. Empty defaults to
                              grant.
                            enum:
                            - grant
                            - revoke
                            type: string
                        required:
                        - privileges
                        - role
                        type: object
                      type: array
                  required:
                  - name
                  type: object
                type: array
              servers:
                description: Servers is the list of foreign servers declaratively
                  managed inside the target database.
                items:
                  description: DatabaseServerSpec is a foreign server managed inside
                    the target database.
                  properties:
                    ensure:
                      default: present
                      description: Ensure is the desired server existence state. Empty
                        defaults to present.
                      enum:
                      - present
                      - absent
                      type: string
                    fdw:
                      description: FDW is the foreign data wrapper name this server
                        uses.
                      minLength: 1
                      type: string
                    name:
                      description: Name is the foreign server name.
                      minLength: 1
                      type: string
                    options:
                      description: Options is the list of server options.
                      items:
                        description: DatabaseOptionSpec is the declared state of a
                          single FDW/server option.
                        properties:
                          ensure:
                            default: present
                            description: Ensure is the desired option existence state.
                              Empty defaults to present.
                            enum:
                            - present
                            - absent
                            type: string
                          name:
                            description: Name is the option name.
                            minLength: 1
                            type: string
                          value:
                            description: Value is the option value. May be omitted
                              when ensure=absent.
                            type: string
                        required:
                        - name
                        type: object
                      type: array
                    usage:
                      description: Usage is the list of server USAGE privilege entries.
                      items:
                        description: DatabaseUsageSpec is a reconcile entry for granting
                          or revoking role USAGE on an FDW/server.
                        properties:
                          name:
                            description: Name is the PostgreSQL role to grant or revoke
                              privileges from.
                            minLength: 1
                            type: string
                          type:
                            default: grant
                            description: Type is grant or revoke. Empty defaults to
                              grant.
                            enum:
                            - grant
                            - revoke
                            type: string
                        required:
                        - name
                        type: object
                      type: array
                  required:
                  - fdw
                  - name
                  type: object
                type: array
              tablespace:
                description: Tablespace is the default tablespace for the database.
                type: string
            required:
            - cluster
            - name
            - owner
            type: object
            x-kubernetes-validations:
            - message: postgres, template0, template1 are reserved database names
              rule: self.name != 'postgres' && self.name != 'template0' && self.name
                != 'template1'
          status:
            description: PostgresDatabaseStatus is the observed reconcile state of
              the database.
            properties:
              applied:
                description: Applied reports whether the latest observedGeneration
                  was successfully applied to PostgreSQL.
                type: boolean
              conditions:
                description: Conditions is the standard Kubernetes condition set.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              message:
                description: Message is a summary of the last reconcile or the failure
                  cause.
                type: string
              observedGeneration:
                description: ObservedGeneration is the last generation processed by
                  the reconciler.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
