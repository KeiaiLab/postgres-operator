# Chart metadata for keiailab/postgres-operator (P1-4, ADR 0007).
# ліё chartлҠ” operator deployment + RBAC + CRD + NetworkPolicyлҘј нҸ¬н•Ён•ңлӢӨ.
# PostgresCluster CR мқёмҠӨн„ҙмҠӨлҠ” лі„лҸ„ chart(charts/postgrescluster, нӣ„мҶҚ) лҳҗлҠ”
# kubectl apply -f examples/<sample>.yamlлЎң л°°нҸ¬н•ңлӢӨ.
apiVersion: v2
name: postgresql-operator
description: |
  Apache-2.0 PostgreSQL Kubernetes operator with first-class Citus distributed
  topology + 5-interface Plugin SDK + stateless QueryRouter. PGO-class single-PG
  HA quality is delivered as built-in baseline; differentiation focuses on Citus
  topology + plugin extensibility.
type: application

# Chart мһҗмІҙ лІ„м „ вҖ” alpha лӢЁкі„, breaking change к°ҖлҠҘ. SemVer мӨҖмҲҳ.
version: 0.1.0-alpha

# ліё chartк°Җ packagingн•ҳлҠ” operator лІ„м „. cmd/main.go binary лІ„м „кіј мқјм№ҳ.
appVersion: "0.1.0-alpha"

home: https://github.com/keiailab/postgres-operator
sources:
  - https://github.com/keiailab/postgres-operator
keywords:
  - postgresql
  - postgres
  - citus
  - operator
  - kubernetes
  - keiailab
  - distributed-sql
  - stateless-router
  - plugin-sdk
maintainers:
  - name: keiailab
    url: https://github.com/keiailab
icon: https://raw.githubusercontent.com/keiailab/postgres-operator/main/docs/assets/logo.png
annotations:
  # ліё chartмқҳ alpha мӢ нҳё. Helm hub/artifacthubм—җ alpha лқјлІЁлЎң н‘ңмӢңлҗҳлҸ„лЎқ.
  artifacthub.io/maturity: alpha
  artifacthub.io/license: Apache-2.0
  artifacthub.io/category: database
  artifacthub.io/operator: "true"
  artifacthub.io/operatorCapabilities: Basic Install
  artifacthub.io/prerelease: "true"
