# Chart metadata for keiailab/postgres-operator (P1-4, ADR 0007).
# 본 chart는 operator deployment + RBAC + CRD + NetworkPolicy를 포함한다.
# PostgresCluster CR 인스턴스는 별도 chart(charts/postgrescluster, 후속) 또는
# kubectl apply -f examples/<sample>.yaml로 배포한다.
apiVersion: v2
name: postgresql-operator
description: |
  Apache-2.0 PostgreSQL Kubernetes operator. Vanilla PostgreSQL (default, Stable) +
  5-interface Plugin SDK + stateless QueryRouter. PGO-class single-PG HA quality
  is delivered as built-in baseline. Distributed SQL via opt-in Citus extension
  (AGPL-3.0, Beta) or upcoming native sharding plugin (RFC 0005). See ADR 0010.
type: application
kubeVersion: ">=1.26.0-0"

# Chart 자체 버전 — alpha 단계, breaking change 가능. SemVer 준수.
version: 0.2.0-alpha

# 본 chart가 packaging하는 operator 버전. cmd/main.go binary 버전과 일치.
appVersion: "0.2.0-alpha"

home: https://github.com/keiailab/postgres-operator
sources:
  - https://github.com/keiailab/postgres-operator
keywords:
  - postgresql
  - postgres
  - postgres-18
  - operator
  - kubernetes
  - keiailab
  - stateless-router
  - plugin-sdk
maintainers:
  - name: keiailab
    email: support@keiailab.com
    url: https://github.com/keiailab
annotations:
  # 본 chart의 alpha 신호. Helm hub/artifacthub에 alpha 라벨로 표시되도록.
  artifacthub.io/maturity: alpha
  artifacthub.io/license: Apache-2.0
  artifacthub.io/category: database
  artifacthub.io/operator: "true"
  artifacthub.io/operatorCapabilities: Basic Install
  artifacthub.io/prerelease: "true"
  artifacthub.io/links: |
    - name: Documentation
      url: https://github.com/keiailab/postgres-operator/blob/main/README.md
    - name: Source Code
      url: https://github.com/keiailab/postgres-operator
    - name: Release Process
      url: https://github.com/keiailab/postgres-operator/blob/main/docs/releases/release-process.md
  artifacthub.io/crds: |
    - kind: PostgresCluster
      version: v1alpha1
      name: postgresclusters.postgres.keiailab.io
      displayName: PostgresCluster
      description: coordinator, worker pool, stateless router로 구성된 PostgreSQL 토폴로지를 선언한다 (vanilla PG18 default, Citus 통합은 ADR 0010 opt-in)
    - kind: BackupJob
      version: v1alpha1
      name: backupjobs.postgres.keiailab.io
      displayName: BackupJob
      description: PostgresCluster 대상의 단일 백업 또는 복구 실행 요청을 선언한다
  artifacthub.io/crdsExamples: |
    - apiVersion: postgres.keiailab.io/v1alpha1
      kind: PostgresCluster
      metadata:
        name: quickstart
        namespace: default
      spec:
        deployment: development
        version:
          postgres: "18"
          # citus: 미지정 — vanilla PG (Stable). Citus opt-in 시 AGPL §13 의무 발생.
        coordinator:
          members: 1
          storage:
            size: 10Gi
        workers:
          - name: pool-a
            members: 1
            storage:
              size: 20Gi
        routers:
          replicas: 1
    - apiVersion: postgres.keiailab.io/v1alpha1
      kind: BackupJob
      metadata:
        name: quickstart-full-backup
        namespace: default
      spec:
        cluster:
          name: quickstart
        tool: pgbackrest
        repo: repo1
        type: full
        executionMode: job
  artifacthub.io/images: |
    - name: manager
      image: ghcr.io/keiailab/postgres-operator:0.2.0-alpha
  artifacthub.io/changes: |
    - kind: changed
      description: "0.2.0-alpha (ADR 0010) — default stack을 vanilla PG18로 전환. Citus 통합은 Beta opt-in으로 격리 (AGPL-3.0 §13 SaaS 의무를 사용자가 부담). Native sharding plugin RFC 0005 진행 중."
    - kind: added
      description: PG 18.3 Stable 채널 진입 (vanilla). PG 16/17 vanilla도 Stable 유지.
    - kind: added
      description: ADR 0010 (license + sharding strategy) + RFC 0005 (native sharding plugin design draft).
