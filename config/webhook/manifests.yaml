---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-postgres-keiailab-io-v1alpha1-postgrescluster
  failurePolicy: Fail
  name: vpostgrescluster.kb.io
  rules:
  - apiGroups:
    - postgres.keiailab.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - postgresclusters
  sideEffects: None
