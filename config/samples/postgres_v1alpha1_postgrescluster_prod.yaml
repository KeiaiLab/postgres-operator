# keiailab/postgres-operator — production 샘플 (vanilla PG18, RFC 0001 v2)
#
# 0.3.0-alpha 이후 schema 는 shardCount/shardingMode 모델로 통합됨.
# coordinator/workers/routers 옛 schema 는 폐기.
#
# 적용 전 확인:
#   - StorageClass "fast-ssd" 가 클러스터에 존재 (없으면 storageClass 제거 또는 변경)
#   - 노드 리소스가 요청 충족 가능
#
# 본 샘플은 다음 production 권장 토폴로지를 시연:
#   - shards.replicas=2 (primary 1 + async replica 2 = 3-way HA)
#   - shardingMode=native + router (multi-shard 시에만 의미. shardCount=1 도 wrapper 검증)
#   - shardCount=2 — 분산 SQL 활성화 (P2+ 진입 후 의미를 가짐).
apiVersion: postgres.keiailab.io/v1alpha1
kind: PostgresCluster
metadata:
  name: prod-cluster
  namespace: pg-system
spec:
  postgresVersion: "18"
  shardingMode: native
  shards:
    initialCount: 2
    replicas: 2
    storage:
      size: 500Gi
      storageClass: fast-ssd
    resources:
      requests:
        cpu: "4"
        memory: 16Gi
  router:
    enabled: true
    replicas: 3
    resources:
      requests:
        cpu: "1"
        memory: 2Gi
  backup:
    enabled: false  # F04 후속에서 의미 — RFC 0001 §3 / RFC 0004
  monitoring:
    serviceMonitor:
      enabled: true
      interval: 30s
    prometheusRule:
      enabled: true
