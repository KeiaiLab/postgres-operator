name: Upstream Watch

# Citus와 PostgreSQL의 새 릴리스를 매일 감지해 internal/version/matrix.go에 자동 PR 생성.
# PG18 + Citus 호환 마이너 발표 시점에 preview-pg18 채널 자동 활성화.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch latest Citus releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/citusdata/citus/releases --paginate \
            --jq '.[] | select(.draft==false) | {tag: .tag_name, name: .name, body: .body}' \
            > /tmp/citus-releases.json || echo '[]' > /tmp/citus-releases.json
      - name: Detect PG18 support in Citus
        id: pg18
        run: |
          if jq -e 'select(.body | test("(?i)PostgreSQL[[:space:]]*18"))' /tmp/citus-releases.json > /tmp/pg18-citus.json; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
          else
            echo "supported=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Open PR if matrix needs update
        if: steps.pg18.outputs.supported == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/upstream-watch-pg18
          title: 'chore(version): activate PG18 in matrix (Citus support detected)'
          body: |
            Citus 새 릴리스가 PostgreSQL 18을 지원하는 것으로 감지되었습니다.

            - internal/version/matrix.go의 PG18 항목 활성화 필요 (preview-pg18 채널)
            - build/images/pg/18/Dockerfile의 CITUS_VERSION 기본값 갱신 필요
            - e2e 매트릭스에 PG17->18 업그레이드 시나리오 추가 필요

            이 PR은 자동 생성되었습니다.
          commit-message: 'chore(version): activate PG18 in matrix'
          labels: |
            automation
            preview-pg18
